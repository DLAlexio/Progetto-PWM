<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css">
  <link rel="icon" type="image/png" sizes="256x256" href="assets/Favicon.png">

  <style>
    body {
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 56px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 84px;
      width: auto;
      display: block;
    }

    .logo-text {
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #2f4f6f;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(90, 74, 60, 0.18);
      line-height: 1;
    }

    .hero {
      min-height: calc(100vh - 110px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px 36px;
      flex-wrap: wrap;
      gap: 24px;
      background: #ffffff;
      border-radius: 28px;
      margin: 0 32px 32px;
    }

    .hero-card {
      background: #ffffff;
      border: none;
      border-radius: 24px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.14);
    }

    .hero-text-card {
      background: #ffffff;
      padding: 30px;
      max-width: 600px;
    }

    .hero-text-card h1 {
      font-size: clamp(2rem, 4vw, 2.6rem);
      font-weight: 800;
      color: #0d2b4d;
      margin-bottom: 0.65rem;
    }

    .hero-text-card p {
      font-size: clamp(1rem, 2vw, 1.12rem);
      margin-top: 10px;
      color: #4a5b70;
      margin-bottom: 1rem;
    }

    .hero-logo-card {
      background: transparent;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 360px;
      min-width: min(440px, 90vw);
    }

    .hero-img {
      max-width: min(420px, 38vw);
    }

    .btn-custom {
      background-color: #5a4a3c;
      color: white;
      padding: 10px 22px;
      font-weight: 600;
      border-radius: 30px;
      margin-right: 12px;
      margin-top: 8px;
    }

    .btn-custom:hover {
      background-color: #4c3f33;
      color: white;
    }
  </style>
</head>

<body>
  <header>
    <a href="login.html" class="logo" aria-label="FastFood">
      <img src="assets/logo.png" alt="FastFood">
          </a>

    <div>
      <a href="login.html" class="btn btn-custom">Login</a>
      <a href="register.html" class="btn btn-custom">Registrati</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-card hero-text-card">
      <div class="hero-text">
        <h1>Controllo totale della tua ristorazione.</h1>
        <p>Una piattaforma veloce e curata per organizzare ordini, menu e servizio con un'esperienza piu chiara.</p>
        <a href="login.html" class="btn btn-custom">Inizia ora</a>
      </div>
    </div>

    <div class="hero-card hero-logo-card">
      <div class="hero-img">
        <img src="assets/logo.png" alt="FastFood Logo" class="img-fluid">
      </div>
    </div>
  </section>

</body>
</html>
